apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-web-frontend
  namespace: ecommerce-app
  labels:
    app: secure-web-frontend
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: secure-web-frontend
  template:
    metadata:
      labels:
        app: secure-web-frontend
        tier: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: web
        image: nginx:alpine
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 101
          runAsGroup: 101
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 8080
        env:
        - name: API_ENDPOINT
          value: "http://secure-api-service:8080"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: var-cache-nginx
          mountPath: /var/cache/nginx
        - name: var-run
          mountPath: /var/run
      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: var-cache-nginx
        emptyDir: {}
      - name: var-run
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: secure-web-service
  namespace: ecommerce-app
spec:
  selector:
    app: secure-web-frontend
  ports:
  - port: 80
    targetPort: 8080
  type: LoadBalancer

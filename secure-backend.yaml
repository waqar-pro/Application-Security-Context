apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-api-backend
  namespace: ecommerce-app
  labels:
    app: secure-api-backend
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: secure-api-backend
  template:
    metadata:
      labels:
        app: secure-api-backend
        tier: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: api
        image: nginx:alpine
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 101
          runAsGroup: 101
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          value: "secure-mysql-service"
        - name: DB_USER
          value: "appuser"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: user-password
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: var-cache-nginx
          mountPath: /var/cache/nginx
        - name: var-run
          mountPath: /var/run
      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: var-cache-nginx
        emptyDir: {}
      - name: var-run
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: secure-api-service
  namespace: ecommerce-app
spec:
  selector:
    app: secure-api-backend
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP

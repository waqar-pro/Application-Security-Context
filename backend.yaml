apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-backend
  namespace: ecommerce-app
  labels:
    app: api-backend
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-backend
  template:
    metadata:
      labels:
        app: api-backend
        tier: backend
    spec:
      containers:
      - name: api
        image: nginx:alpine
        ports:
        - containerPort: 80
        env:
        - name: DB_HOST
          value: "mysql-service"
        - name: DB_USER
          value: "appuser"
        - name: DB_PASSWORD
          value: "apppassword123"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: ecommerce-app
spec:
  selector:
    app: api-backend
  ports:
  - port: 8080
    targetPort: 80
  type: ClusterIP

